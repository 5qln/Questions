name: membrane

# The commons-side membrane gate. Runs on every push and pull request so that
# no question carrying private content (α, Z, ∇, B'', the Codex seal, a cycle
# number) can ever land in the public commons — including via a direct push or
# a fork's pull request. This is the third of the three gates; it trusts no
# client. See bin/membrane_lint.py and membrane-spec.json.

on:
  push:
    paths:
      - "questions/**"
      - "bin/membrane_lint.py"
      - "membrane-spec.json"
      - "tests/**"
      - ".github/workflows/membrane.yml"
  pull_request:
    paths:
      - "questions/**"
      - "bin/membrane_lint.py"
      - "membrane-spec.json"
      - "tests/**"
      - ".github/workflows/membrane.yml"

permissions:
  contents: read

jobs:
  membrane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Run the membrane gate over every question
        run: python3 bin/membrane_lint.py

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m py_compile bin/membrane_lint.py
      - name: Tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest -q
